<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // SPA fallback for GitHub Pages.
      // Rewrites /work-instructions/anything -> /work-instructions/?p=/anything
      // index.html reads ?p= and uses history.replaceState to restore the deep link.
      (function () {
        var segmentsToKeep = 1; // number of path segments that belong to the GH Pages project (e.g. /work-instructions)
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?p=/' +
          l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
